name: Refresh Global Job Feed

on:
  schedule:
    # Every 30 minutes (Remotive, Arbeitnow, Jobicy, RemoteOK — all free, no quotas)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch only, no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh:
    name: Fetch global feeds
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run global feed refresh
        run: npm run refresh-global
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::Global feed refresh failed — check logs above"
