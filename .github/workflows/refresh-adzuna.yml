name: Refresh Adzuna Job Feed

on:
  schedule:
    # Once daily at 2:00 AM UTC — Adzuna free tier is ~250 requests/month
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    name: Fetch Adzuna jobs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Adzuna refresh
        run: npm run refresh-adzuna
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::Adzuna refresh failed — check logs above"
