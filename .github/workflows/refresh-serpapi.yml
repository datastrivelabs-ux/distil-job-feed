name: Refresh Google Jobs (SerpAPI)

on:
  schedule:
    # Once daily at 6:00 AM UTC — free tier is 100 searches/month (~3/day)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    name: Fetch Google Jobs via SerpAPI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run SerpAPI refresh
        run: npx tsx scripts/refresh-serpapi.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::SerpAPI refresh failed — check logs above"
